<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kalender – Slide</title>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; }

    /* Background */
    body{
      color:#eaf4ff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(
        90deg,
        #4ed347 0%,
        #37b352 12%,
        #2f9b61 26%,
        #2c7d78 40%,
        #2a668e 56%,
        #284ea7 72%,
        #2c37c2 86%,
        #3124dd 100%
      );
    }

    .wrap{
      position:relative;
      width:100%;
      height:100%;
      box-sizing:border-box;
      padding:40px 44px 124px 44px;
    }

    .mainContent{
      width:calc(100% - 120px);
      height:100%;
      margin:0 auto;
      min-width:0;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:28px;
      transform:translateY(6px);
    }

    .headline{
      margin:0;
      font-size:clamp(36px, 3.0vw, 58px);
      font-weight:700;
      line-height:1.04;
      letter-spacing:-0.02em;
      text-shadow:0 4px 16px rgba(0,0,0,0.16);
    }

    .list{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:7px;
      padding-right:8px;
      overflow:hidden;
    }

    .eventRow{
      display:grid;
      grid-template-columns:104px minmax(0, 1fr);
      gap:18px;
      align-items:start;
      min-height:58px;
    }

    .dateCell{ padding-top:2px; line-height:1; color:#eef9ff; }
    .dateTop{ font-size:22px; font-weight:800; letter-spacing:-0.02em; }
    .dateMonth{ margin-top:5px; font-size:15px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; opacity:0.94; }
    .dateWeekday{ margin-top:6px; font-size:16px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:#cfe7ff; opacity:0.96; }
    .dateSpacer{ visibility:hidden; }

    .eventTitle{
      margin:0;
      font-size:clamp(24px, 2.05vw, 38px);
      font-weight:450;
      line-height:1.08;
      letter-spacing:-0.02em;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      text-shadow:0 2px 10px rgba(0,0,0,0.10);
    }

    .eventMeta{
      margin-top:4px;
      font-size:19px;
      line-height:1.18;
      color:#d5e6f7;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .screenLogo{
      position:absolute;
      left:16px;
      bottom:22px;
      width:142px;
      height:142px;
      display:flex;
      align-items:flex-end;
      z-index:3;
      pointer-events:none;
    }
    .screenLogo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,0.18));
    }

    .screenCta{
      position:absolute;
      right:24px;
      bottom:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      width:176px;
      z-index:3;
      pointer-events:none;
    }

    .qrWrap{
      width:108px;
      height:108px;
      border-radius:14px;
      background:rgba(255,255,255,0.97);
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 6px 18px rgba(0,0,0,0.16);
    }

    .qrWrap img{ width:100%; height:100%; object-fit:contain; display:block; }

    .ctaText{
      font-size:15px;
      line-height:1.2;
      color:#eaf4ff;
      font-weight:800;
      margin-bottom:4px;
      text-shadow:0 2px 10px rgba(0,0,0,0.10);
      text-align:center;
    }

    .siteLink{
      font-size:13px;
      line-height:1.18;
      color:#cfe7ff;
      font-weight:800;
      text-shadow:0 2px 8px rgba(0,0,0,0.08);
      overflow-wrap:anywhere;
      text-align:center;
    }

    .overlayMessage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
      box-sizing:border-box;
      font-size:32px;
      font-weight:700;
      text-shadow:0 4px 16px rgba(0,0,0,0.14);
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mainContent">
      <h1 id="headline" class="headline">Dette kan du oppleve i Åmot kulturhus</h1>
      <div id="list" class="list"></div>
    </div>

    <div class="screenLogo">
      <img src="./assets/logo.jpg" alt="Logo" onerror="this.style.display='none';">
    </div>

    <div class="screenCta">
      <div class="qrWrap">
        <img src="./assets/QR.png" alt="QR-kode" onerror="this.style.display='none'; this.parentNode.style.display='none';">
      </div>
      <div>
        <div class="ctaText">Les mer - Kjøp her</div>
        <div class="siteLink">www.amotkulturhus.no</div>
      </div>
    </div>

    <div id="overlay" class="overlayMessage">Laster kalenderdata…</div>
  </div>

<script>
(() => {
  // Calendar feed (JSONP)
  const EVENTS_URL =
    "https://script.google.com/macros/s/AKfycbzWYkczmmUW_cNhNd6NYoozKYlMH9XXp95DNo-JrCSI172oSjYPPL13AQ1feoktAKy6kQ/exec";

  // Optional refresh tuning via URL params:
  // ?refresh=300  (seconds)
  // ?max=7        (max events)
  const params = new URLSearchParams(location.search);
  const REFRESH_SECONDS = Math.max(30, Number(params.get("refresh") || 300));
  const MAX_EVENTS = Math.max(1, Math.min(20, Number(params.get("max") || 7)));

  const headlineEl = document.getElementById("headline");
  const listEl = document.getElementById("list");
  const overlayEl = document.getElementById("overlay");

  const WEEKDAYS = ["SØN", "MAN", "TIR", "ONS", "TOR", "FRE", "LØR"];
  const MONTHS = ["JAN", "FEB", "MAR", "APR", "MAI", "JUN", "JUL", "AUG", "SEP", "OKT", "NOV", "DES"];

  let lastGoodData = null;
  let loadTimer = null;
  let callbackFired = false;

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function parseDateTime(value) {
    if (!value) return null;
    const m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})(?::(\d{2}))?$/);
    if (!m) return null;
    const d = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +(m[6]||0));
    return Number.isNaN(d.getTime()) ? null : d;
  }

  function timeText(d) {
    return new Intl.DateTimeFormat("nb-NO", { hour:"2-digit", minute:"2-digit" }).format(d);
  }

  function makeDateKey(d) {
    return d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate();
  }

  function renderDateCell(date, repeated) {
    if (repeated) {
      return '<div class="dateCell dateSpacer"><div class="dateTop">00.</div><div class="dateMonth">JAN</div><div class="dateWeekday">MAN</div></div>';
    }
    return '' +
      '<div class="dateCell">' +
        '<div class="dateTop">' + date.getDate() + '.</div>' +
        '<div class="dateMonth">' + MONTHS[date.getMonth()] + '</div>' +
        '<div class="dateWeekday">' + WEEKDAYS[date.getDay()] + '</div>' +
      '</div>';
  }

  function normalizeEvents(data) {
    const now = new Date();
    return (Array.isArray(data.events) ? data.events : [])
      .map(ev => {
        const begin = parseDateTime(ev.begin);
        const end = parseDateTime(ev.end);
        return {
          title: String(ev.title || "").trim(),
          place: String(ev.place || ev.location || "").trim(),
          begin, end
        };
      })
      .filter(ev => ev.title && ev.begin)
      .filter(ev => !ev.end || ev.end >= now)
      .sort((a,b) => a.begin - b.begin)
      .slice(0, MAX_EVENTS);
  }

  function render(data) {
    if (data && Array.isArray(data.events)) lastGoodData = data;
    const effective = lastGoodData || data || {};

    headlineEl.textContent = effective.title ? String(effective.title) : "Dette kan du oppleve i Åmot kulturhus";

    const events = normalizeEvents(effective);
    if (!events.length) {
      listEl.innerHTML = "";
      overlayEl.style.display = "flex";
      overlayEl.textContent = "Ingen kommende hendelser.";
      return;
    }

    let lastKey = "";
    let html = "";

    for (const ev of events) {
      const key = makeDateKey(ev.begin);
      const repeated = key === lastKey;
      lastKey = key;

      const meta =
        timeText(ev.begin) +
        (ev.end ? " - " + timeText(ev.end) : "") +
        (ev.place ? " " + ev.place : "");

      html += '' +
        '<div class="eventRow">' +
          renderDateCell(ev.begin, repeated) +
          '<div>' +
            '<h2 class="eventTitle">' + escapeHtml(ev.title) + '</h2>' +
            '<div class="eventMeta">' + escapeHtml(meta) + '</div>' +
          '</div>' +
        '</div>';
    }

    listEl.innerHTML = html;
    overlayEl.style.display = "none";
  }

  function showError() {
    // If we have cached data, keep showing it; otherwise show error text.
    if (lastGoodData) {
      render(lastGoodData);
      return;
    }
    listEl.innerHTML = "";
    overlayEl.style.display = "flex";
    overlayEl.textContent = "Kunne ikke laste kalenderdata.";
  }

  // Your feed might call a fixed function name.
  // We accept BOTH:
  //  - JSONP: callback=__calendarFeedLoaded
  //  - Plain script: calls handleCalendarData(data) or calendarData(data)
  window.__calendarFeedLoaded = function(data) {
    callbackFired = true;
    render(data || {});
  };
  window.handleCalendarData = function(data) {
    callbackFired = true;
    render(data || {});
  };
  window.calendarData = function(data) {
    callbackFired = true;
    render(data || {});
  };

  function loadCalendar() {
    callbackFired = false;
    clearTimeout(loadTimer);

    // remove old script
    const old = document.getElementById("calendarFeedScript");
    if (old && old.parentNode) old.parentNode.removeChild(old);

    // try JSONP callback mode first
    const s = document.createElement("script");
    s.id = "calendarFeedScript";
    s.async = true;
    s.src = EVENTS_URL + "?callback=__calendarFeedLoaded&_=" + Date.now();

    s.onerror = function () { tryPlain(); };
    document.head.appendChild(s);

    loadTimer = setTimeout(function () {
      if (!callbackFired) tryPlain();
    }, 9000);

    function tryPlain() {
      clearTimeout(loadTimer);

      const old2 = document.getElementById("calendarFeedScript");
      if (old2 && old2.parentNode) old2.parentNode.removeChild(old2);

      const s2 = document.createElement("script");
      s2.id = "calendarFeedScript";
      s2.async = true;
      s2.src = EVENTS_URL + "?_=" + Date.now();
      s2.onerror = function () { showError(); };
      document.head.appendChild(s2);

      loadTimer = setTimeout(function () {
        if (!callbackFired) showError();
      }, 9000);
    }
  }

  // Start
  render({});
  loadCalendar();
  setInterval(loadCalendar, REFRESH_SECONDS * 1000);
})();
</script>
</body>
</html>
