<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kalenderslide</title>
  <style>
    :root{
      --text:#eaf4ff;
      --muted:#d5e6f7;
      --soft:#cfe7ff;
      --line:rgba(255,255,255,0.10);
      --panelBgTop:rgba(8,18,34,0.18);
      --panelBgBottom:rgba(7,14,30,0.30);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background: linear-gradient(
        90deg,
        #4ed347 0%,
        #37b352 12%,
        #2f9b61 26%,
        #2c7d78 40%,
        #2a668e 56%,
        #284ea7 72%,
        #2c37c2 86%,
        #3124dd 100%
      );
      color:var(--text);
      font-family: system-ui, -apple-system, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    .wrap{
      position:relative;
      width:100%;
      height:100%;
      padding:24px 38px 138px 38px; /* bottom space for floating logo + QR */
      display:grid;
      grid-template-columns:minmax(0, 1fr) 340px;
      grid-template-rows:auto 1fr;
      gap:14px 34px;
    }

    .headlineWrap{
      grid-column:1 / 2;
      grid-row:1 / 2;
      width:min(100%, 880px);
      justify-self:center;
      align-self:start; /* keep title at top */
      min-width:0;
    }

    .headline{
      margin:0;
      font-size:clamp(34px, 2.8vw, 54px);
      font-weight:700;
      line-height:1.04;
      letter-spacing:-0.02em;
      text-shadow:0 4px 16px rgba(0,0,0,0.14);
    }

    .list{
      grid-column:1 / 2;
      grid-row:2 / 3;
      width:min(100%, 880px);
      min-width:0;
      justify-self:center;
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:hidden;
    }

    .eventRow{
      display:grid;
      grid-template-columns:96px minmax(0, 1fr);
      gap:18px;
      align-items:start;
      min-height:64px;
    }

    .dateCell{
      padding-top:2px;
      line-height:1;
      color:#f1fbff;
    }

    .dateTop{
      font-size:20px;
      font-weight:700;
      letter-spacing:-0.02em;
    }

    .dateMonth{
      margin-top:5px;
      font-size:14px;
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
      opacity:0.95;
    }

    .dateWeekday{
      margin-top:6px;
      font-size:15px;
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:var(--soft);
      opacity:0.95;
    }

    .dateSpacer{
      visibility:hidden;
    }

    .eventCard{
      min-width:0;
      padding-top:2px;
    }

    .eventTitle{
      margin:0;
      font-size:clamp(24px, 2vw, 36px);
      font-weight:400;
      line-height:1.08;
      letter-spacing:-0.02em;
      color:var(--text);
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      text-shadow:0 2px 10px rgba(0,0,0,0.10);
    }

    .eventMeta{
      margin-top:4px;
      font-size:18px;
      line-height:1.2;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .side{
      grid-column:2 / 3;
      grid-row:1 / 2;
      align-self:start;
      position:relative;
      border-radius:24px;
      background:linear-gradient(180deg, var(--panelBgTop), var(--panelBgBottom));
      border:1px solid var(--line);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 14px 30px rgba(0,0,0,0.10);
      overflow:hidden;
      backdrop-filter: blur(4px);
      min-height:160px;
    }

    .sideGlow{
      position:absolute;
      inset:auto -60px -90px auto;
      width:220px;
      height:220px;
      background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 62%);
      pointer-events:none;
    }

    .sideInner{
      position:relative;
      z-index:1;
      padding:20px 22px 18px 22px;
    }

    .brandText{
      font-size:16px;
      line-height:1.45;
      color:var(--muted);
    }

    .brandText strong{
      display:block;
      margin-bottom:8px;
      font-size:22px;
      color:var(--text);
      font-weight:700;
      letter-spacing:-0.01em;
    }

    /* Logo bottom-left of the whole screen */
    .screenLogo{
      position:absolute;
      left:28px;
      bottom:22px;
      width:92px;
      height:92px;
      display:flex;
      align-items:flex-end;
      justify-content:flex-start;
      z-index:3;
      pointer-events:none;
    }

    .screenLogo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,0.18));
    }

    /* QR block bottom-right of the whole screen */
    .screenCta{
      position:absolute;
      right:28px;
      bottom:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      z-index:3;
      width:170px;
      pointer-events:none;
    }

    .qrWrap{
      width:112px;
      height:112px;
      border-radius:14px;
      background:rgba(255,255,255,0.97);
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 6px 18px rgba(0,0,0,0.16);
      flex:0 0 auto;
    }

    .qrWrap img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .screenCtaInfo{
      width:100%;
      text-align:center;
    }

    .ctaText{
      font-size:16px;
      line-height:1.2;
      color:var(--text);
      font-weight:700;
      margin-bottom:5px;
      text-shadow:0 2px 10px rgba(0,0,0,0.10);
    }

    .siteLink{
      font-size:14px;
      line-height:1.22;
      color:var(--soft);
      font-weight:700;
      text-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .empty{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      height:100%;
      font-size:32px;
      font-weight:600;
      color:var(--text);
      text-align:center;
      padding:40px;
      text-shadow:0 4px 16px rgba(0,0,0,0.14);
    }

    @media (orientation: portrait) {
      .wrap{
        padding:20px 20px 126px 20px;
        grid-template-columns:1fr;
        grid-template-rows:auto auto 1fr;
        gap:12px;
      }

      .headlineWrap{
        grid-column:1 / 2;
        grid-row:1 / 2;
        width:100%;
      }

      .headline{
        font-size:clamp(28px, 5vw, 42px);
      }

      .list{
        grid-column:1 / 2;
        grid-row:3 / 4;
        width:100%;
        gap:8px;
      }

      .eventRow{
        grid-template-columns:72px minmax(0, 1fr);
        gap:14px;
        min-height:52px;
      }

      .dateTop{ font-size:16px; }
      .dateMonth{ font-size:11px; margin-top:4px; }
      .dateWeekday{ font-size:12px; margin-top:4px; }

      .eventTitle{
        font-size:clamp(16px, 3vw, 24px);
        -webkit-line-clamp:1;
      }

      .eventMeta{
        margin-top:3px;
        font-size:13px;
      }

      .side{
        grid-column:1 / 2;
        grid-row:2 / 3;
        min-height:112px;
        border-radius:18px;
      }

      .sideInner{
        padding:15px 16px;
      }

      .brandText{
        font-size:13px;
        line-height:1.35;
      }

      .brandText strong{
        margin-bottom:5px;
        font-size:18px;
      }

      .screenLogo{
        left:18px;
        bottom:14px;
        width:58px;
        height:58px;
      }

      .screenCta{
        right:16px;
        bottom:12px;
        width:128px;
        gap:6px;
      }

      .qrWrap{
        width:82px;
        height:82px;
        border-radius:10px;
        padding:5px;
      }

      .ctaText{
        font-size:12px;
        margin-bottom:3px;
      }

      .siteLink{
        font-size:11px;
        line-height:1.16;
      }
    }
  </style>
</head>
<body>
  <div id="empty" class="empty">Laster kalenderdata…</div>

  <div id="app" class="wrap" style="display:none;">
    <div class="headlineWrap">
      <h1 id="headline" class="headline">Dette kan du oppleve i Åmot kulturhus</h1>
    </div>

    <div id="list" class="list"></div>

    <aside class="side">
      <div class="sideGlow"></div>
      <div class="sideInner">
        <div class="brandText">
          <strong>Velkommen</strong>
          Kommende program vises her fortløpende.<br>
          Billetter og mer informasjon finner du på nettsiden.
        </div>
      </div>
    </aside>

    <div class="screenLogo">
      <img src="./assets/logo.jpg" alt="Logo" onerror="this.style.display='none';">
    </div>

    <div class="screenCta">
      <div class="qrWrap">
        <img src="./assets/QR.png" alt="QR-kode" onerror="this.style.display='none'; this.parentNode.style.display='none';">
      </div>

      <div class="screenCtaInfo">
        <div class="ctaText">Les mer - Kjøp her</div>
        <div class="siteLink">www.amotkulturhus.no</div>
      </div>
    </div>
  </div>

<script>
(function () {
  var EVENTS_URL = "https://script.google.com/macros/s/AKfycbzWYkczmmUW_cNhNd6NYoozKYlMH9XXp95DNo-JrCSI172oSjYPPL13AQ1feoktAKy6kQ/exec";
  var REFRESH_MS = 5 * 60 * 1000; // 5 minutter
  var LOAD_TIMEOUT_MS = 10000;

  var els = {
    app: document.getElementById("app"),
    empty: document.getElementById("empty"),
    list: document.getElementById("list"),
    headline: document.getElementById("headline")
  };

  var WEEKDAYS = ["SØN", "MAN", "TIR", "ONS", "TOR", "FRE", "LØR"];
  var MONTHS = ["JAN", "FEB", "MAR", "APR", "MAI", "JUN", "JUL", "AUG", "SEP", "OKT", "NOV", "DES"];

  var lastData = null;
  var loadTimer = null;
  var callbackFired = false;

  function isLandscape() {
    return window.innerWidth >= window.innerHeight;
  }

  function maxEvents() {
    return isLandscape() ? 7 : 18;
  }

  function parseDateTime(value) {
    if (!value) return null;

    var m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})(?::(\d{2}))?$/);
    if (!m) return null;

    var d = new Date(
      Number(m[1]),
      Number(m[2]) - 1,
      Number(m[3]),
      Number(m[4]),
      Number(m[5]),
      Number(m[6] || 0)
    );

    return Number.isNaN(d.getTime()) ? null : d;
  }

  function timeText(d) {
    return new Intl.DateTimeFormat("nb-NO", {
      hour: "2-digit",
      minute: "2-digit"
    }).format(d);
  }

  function makeDateKey(d) {
    return d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate();
  }

  function normalizeEvents(data) {
    var now = new Date();

    return (Array.isArray(data.events) ? data.events : [])
      .map(function (ev) {
        var begin = parseDateTime(ev.begin);
        var end = parseDateTime(ev.end);
        return {
          title: String(ev.title || "").trim(),
          place: String(ev.place || ev.location || "").trim(),
          begin: begin,
          end: end
        };
      })
      .filter(function (ev) {
        return ev.title && ev.begin;
      })
      .filter(function (ev) {
        return !ev.end || ev.end >= now;
      })
      .sort(function (a, b) {
        return a.begin - b.begin;
      })
      .slice(0, maxEvents());
  }

  function renderDateCell(date, repeated) {
    if (repeated) {
      return '<div class="dateCell dateSpacer"><div class="dateTop">00.</div><div class="dateMonth">JAN</div><div class="dateWeekday">MAN</div></div>';
    }

    return '' +
      '<div class="dateCell">' +
        '<div class="dateTop">' + date.getDate() + '.</div>' +
        '<div class="dateMonth">' + MONTHS[date.getMonth()] + '</div>' +
        '<div class="dateWeekday">' + WEEKDAYS[date.getDay()] + '</div>' +
      '</div>';
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function renderEvents(events) {
    var lastDateKey = "";
    var html = "";

    events.forEach(function (ev) {
      var key = makeDateKey(ev.begin);
      var repeated = key === lastDateKey;
      lastDateKey = key;

      var meta = timeText(ev.begin) +
        (ev.end ? " - " + timeText(ev.end) : "") +
        (ev.place ? " " + ev.place : "");

      html += '' +
        '<div class="eventRow">' +
          renderDateCell(ev.begin, repeated) +
          '<div class="eventCard">' +
            '<h2 class="eventTitle">' + escapeHtml(ev.title) + '</h2>' +
            '<div class="eventMeta">' + escapeHtml(meta) + '</div>' +
          '</div>' +
        '</div>';
    });

    els.list.innerHTML = html;
  }

  function render(data) {
    var events = normalizeEvents(data || {});

    els.headline.textContent = data && data.title
      ? data.title
      : "Dette kan du oppleve i Åmot kulturhus";

    if (!events.length) {
      els.app.style.display = "none";
      els.empty.style.display = "flex";
      els.empty.textContent = "Ingen kommende hendelser.";
      return;
    }

    els.empty.style.display = "none";
    els.app.style.display = "grid";
    renderEvents(events);
  }

  function showError() {
    if (lastData) {
      render(lastData);
      return;
    }

    els.app.style.display = "none";
    els.empty.style.display = "flex";
    els.empty.textContent = "Kunne ikke laste kalenderdata.";
  }

  window.__calendarFeedLoaded = function (data) {
    callbackFired = true;
    clearTimeout(loadTimer);
    lastData = data || {};
    render(lastData);
  };

  function loadCalendar() {
    callbackFired = false;
    clearTimeout(loadTimer);

    var old = document.getElementById("calendarFeedScript");
    if (old && old.parentNode) old.parentNode.removeChild(old);

    var s = document.createElement("script");
    s.id = "calendarFeedScript";
    s.async = true;
    s.src = EVENTS_URL + "?_=" + Date.now();

    s.onerror = function () {
      clearTimeout(loadTimer);
      showError();
    };

    s.onload = function () {
      setTimeout(function () {
        if (!callbackFired) showError();
      }, 300);
    };

    document.head.appendChild(s);

    loadTimer = setTimeout(function () {
      showError();
    }, LOAD_TIMEOUT_MS);
  }

  window.addEventListener("resize", function () {
    if (lastData) render(lastData);
  });

  els.empty.textContent = "Laster kalenderdata…";
  els.empty.style.display = "flex";
  els.app.style.display = "none";

  loadCalendar();
  setInterval(loadCalendar, REFRESH_MS);
})();
</script>
</body>
</html>
