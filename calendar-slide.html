<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kalenderslide</title>
  <style>
    :root{
      --bg1:#08263f;
      --bg2:#0a2f66;
      --bg3:#0b4a5b;
      --text:#eaf4ff;
      --muted:#b8d2ea;
      --soft:#8bb7db;
      --line:rgba(255,255,255,0.08);
      --panel:rgba(7,16,30,0.34);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(1100px 700px at 12% 18%, rgba(0,193,125,0.28), transparent 45%),
        radial-gradient(900px 700px at 78% 82%, rgba(56,102,255,0.30), transparent 42%),
        linear-gradient(130deg, var(--bg3) 0%, var(--bg1) 38%, var(--bg2) 100%);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    .wrap{
      position:relative;
      width:100%;
      height:100%;
      padding:40px 44px 34px 44px;
      display:grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      grid-template-rows: auto 1fr;
      gap:22px 28px;
    }

    .headline{
      grid-column:1 / 2;
      align-self:end;
      font-size: clamp(34px, 2.8vw, 54px);
      font-weight:700;
      letter-spacing:-0.02em;
      line-height:1.04;
      text-shadow: 0 4px 16px rgba(0,0,0,0.18);
      margin:0;
    }

    .updated{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      opacity:0.9;
    }

    .list{
      grid-column:1 / 2;
      grid-row:2 / 3;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-right:8px;
    }

    .eventRow{
      display:grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap:18px;
      align-items:start;
      min-height:70px;
    }

    .dateCell{
      padding-top:2px;
      color:#d7f0ff;
      text-align:left;
      line-height:1;
      user-select:none;
    }

    .dateTop{
      font-size:20px;
      font-weight:700;
      letter-spacing:-0.02em;
    }

    .dateMonth{
      margin-top:5px;
      font-size:14px;
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
      opacity:0.92;
    }

    .dateWeekday{
      margin-top:6px;
      font-size:15px;
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#9fd5ff;
      opacity:0.95;
    }

    .dateSpacer{
      visibility:hidden;
    }

    .eventCard{
      min-width:0;
      padding-top:2px;
    }

    .eventTitle{
      margin:0;
      font-size: clamp(24px, 2vw, 36px);
      font-weight:400;
      line-height:1.08;
      letter-spacing:-0.02em;
      color:var(--text);

      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .eventMeta{
      margin-top:5px;
      font-size:18px;
      line-height:1.2;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .side{
      grid-column:2 / 3;
      grid-row:1 / 3;
      position:relative;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(9,18,34,0.28), rgba(7,16,30,0.42));
      border:1px solid var(--line);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 14px 40px rgba(0,0,0,0.18);
      overflow:hidden;
    }

    .sideGlow{
      position:absolute;
      inset:auto -50px -90px auto;
      width:220px;
      height:220px;
      background:radial-gradient(circle, rgba(82,128,255,0.24), transparent 60%);
      pointer-events:none;
    }

    .sideInner{
      position:absolute;
      inset:0;
      padding:28px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:18px;
    }

    .brandText{
      font-size:18px;
      line-height:1.35;
      color:var(--muted);
    }

    .brandText strong{
      display:block;
      margin-bottom:8px;
      font-size:22px;
      color:var(--text);
      font-weight:700;
      letter-spacing:-0.01em;
    }

    .logoWrap{
      align-self:flex-end;
      width:116px;
      height:116px;
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
    }

    .logoWrap img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.22));
    }

    .empty{
      display:none;
      align-items:center;
      justify-content:center;
      width:100%;
      height:100%;
      font-size:32px;
      font-weight:600;
      color:var(--text);
      text-align:center;
      padding:40px;
    }
  </style>
</head>
<body>
  <div id="empty" class="empty">Ingen kommende hendelser.</div>

  <div id="app" class="wrap">
    <div>
      <h1 id="headline" class="headline">Dette kan du oppleve i Åmot kulturhus</h1>
      <div id="updated" class="updated"></div>
    </div>

    <div id="list" class="list"></div>

    <aside class="side">
      <div class="sideGlow"></div>
      <div class="sideInner">
        <div class="brandText">
          <strong>Velkommen</strong>
          Kommende program vises her fortløpende.<br>
          Billetter og mer informasjon finner du på nettsiden.
        </div>

        <div class="logoWrap">
          <img src="./assets/logo.png" alt="Logo" onerror="this.style.display='none';">
        </div>
      </div>
    </aside>
  </div>

<script>
(async () => {
  const EVENTS_URL = "./assets/info-events.json";
  const MAX_LINES = 7;
  const REFRESH_MS = 5 * 60 * 1000;

  const els = {
    app: document.getElementById("app"),
    empty: document.getElementById("empty"),
    list: document.getElementById("list"),
    headline: document.getElementById("headline"),
    updated: document.getElementById("updated")
  };

  const WEEKDAYS = ["SØN", "MAN", "TIR", "ONS", "TOR", "FRE", "LØR"];
  const MONTHS = ["JAN", "FEB", "MAR", "APR", "MAI", "JUN", "JUL", "AUG", "SEP", "OKT", "NOV", "DES"];

  function parseDateTime(value) {
    if (!value) return null;
    const m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})(?::(\d{2}))?$/);
    if (!m) return null;
    const d = new Date(
      Number(m[1]),
      Number(m[2]) - 1,
      Number(m[3]),
      Number(m[4]),
      Number(m[5]),
      Number(m[6] || 0)
    );
    return Number.isNaN(d.getTime()) ? null : d;
  }

  function timeText(d) {
    return new Intl.DateTimeFormat("nb-NO", {
      hour: "2-digit",
      minute: "2-digit"
    }).format(d);
  }

  function makeDateKey(d) {
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }

  function formatUpdated(value) {
    const d = parseDateTime(String(value).replace("T", " ").replace("Z", ""));
    if (!d) return "";
    return "Oppdatert " + new Intl.DateTimeFormat("nb-NO", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    }).format(d);
  }

  function normalizeEvents(data) {
    const now = new Date();

    return (Array.isArray(data.events) ? data.events : [])
      .map(ev => {
        const begin = parseDateTime(ev.begin);
        const end = parseDateTime(ev.end);
        return {
          title: String(ev.title || "").trim(),
          place: String(ev.place || ev.location || "").trim(),
          begin,
          end
        };
      })
      .filter(ev => ev.title && ev.begin)
      .filter(ev => !ev.end || ev.end >= now)
      .sort((a, b) => a.begin - b.begin)
      .slice(0, MAX_LINES);
  }

  function renderDateCell(date, repeated) {
    if (repeated) {
      return `<div class="dateCell dateSpacer"><div class="dateTop">00.</div><div class="dateMonth">JAN</div><div class="dateWeekday">MAN</div></div>`;
    }

    return `
      <div class="dateCell">
        <div class="dateTop">${date.getDate()}.</div>
        <div class="dateMonth">${MONTHS[date.getMonth()]}</div>
        <div class="dateWeekday">${WEEKDAYS[date.getDay()]}</div>
      </div>
    `;
  }

  function renderEvents(events) {
    let lastDateKey = "";

    els.list.innerHTML = events.map(ev => {
      const key = makeDateKey(ev.begin);
      const repeated = key === lastDateKey;
      lastDateKey = key;

      const meta = `${timeText(ev.begin)}${ev.end ? ` - ${timeText(ev.end)}` : ""}${ev.place ? ` ${ev.place}` : ""}`;

      return `
        <div class="eventRow">
          ${renderDateCell(ev.begin, repeated)}
          <div class="eventCard">
            <h2 class="eventTitle">${escapeHtml(ev.title)}</h2>
            <div class="eventMeta">${escapeHtml(meta)}</div>
          </div>
        </div>
      `;
    }).join("");
  }

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  async function fetchJson(url) {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  }

  async function load() {
    try {
      const data = await fetchJson(EVENTS_URL);
      const events = normalizeEvents(data);

      els.headline.textContent = data.title || "Dette kan du oppleve i Åmot kulturhus";
      els.updated.textContent = data.updated ? formatUpdated(data.updated) : "";

      if (!events.length) {
        els.app.style.display = "none";
        els.empty.style.display = "flex";
        return;
      }

      els.empty.style.display = "none";
      els.app.style.display = "grid";
      renderEvents(events);
    } catch (err) {
      els.app.style.display = "none";
      els.empty.style.display = "flex";
      els.empty.textContent = "Kunne ikke laste kalenderdata.";
    }
  }

  await load();
  setInterval(() => { load().catch(() => {}); }, REFRESH_MS);
})();
</script>
</body>
</html>
