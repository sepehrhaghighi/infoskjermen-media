<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portrait – Films + Arrangements</title>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; }

    .stage{
      position:relative;
      width:100%;
      height:100%;
      z-index:1;
    }

    .layer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      opacity:0;
      transition: opacity 900ms ease-in-out;
      will-change: opacity;
    }

    .layer.show{
      opacity:1;
    }

    #empty{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      color:#fff;
      background:#000;
      text-align:center;
      padding:40px;
      font:26px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      z-index:2000;
    }

    .qrWrap{
      position:fixed;
      right:20px;
      bottom:20px;
      z-index:1000;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      pointer-events:none;

      opacity:0;
      transition: opacity 900ms ease-in-out;
      will-change: opacity;
    }

    .qrWrap.show{
      opacity:1;
    }

    .qrImg{
      width:130px;
      height:130px;
      object-fit:contain;
      background:rgba(255,255,255,0.97);
      padding:10px;
      border-radius:16px;
      box-shadow:
        0 14px 34px rgba(0,0,0,0.50),
        0 3px 10px rgba(0,0,0,0.30);
    }

    .qrText{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      color:#fff;
      background:rgba(0,0,0,0.74);
      padding:9px 14px;
      border-radius:14px;
      box-shadow:
        0 10px 24px rgba(0,0,0,0.38),
        0 2px 8px rgba(0,0,0,0.24);
      text-align:center;
      line-height:1.15;
      white-space:nowrap;
    }

    .qrMain{
      font:16px/1.15 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      letter-spacing:0.2px;
    }

    .qrSub{
      font:14px/1.15 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      opacity:0.95;
      letter-spacing:0.15px;
    }

    .dateLayer{
      position:fixed;
      left:20px;
      bottom:20px;
      z-index:900;
      opacity:0;
      transition: opacity 900ms ease-in-out;
      will-change: opacity;

      color:#fff;
      background:rgba(0,0,0,0.74);
      padding:10px 14px;
      border-radius:14px;
      box-shadow:
        0 10px 26px rgba(0,0,0,0.45),
        0 2px 8px rgba(0,0,0,0.28);

      font:22px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      letter-spacing:0.2px;
      pointer-events:none;
      max-width:calc(100vw - 180px);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;

      /* Bypassed for now. Remove this line to show date/time again. */
      display: none !important;
    }

    .dateLayer.show{
      opacity:1;
    }
  </style>
</head>
<body>
  <div id="empty">No posters available.</div>

  <div class="stage">
    <img id="a" class="layer show" alt="">
    <img id="b" class="layer" alt="">
  </div>

  <div id="qrWrap" class="qrWrap">
    <img id="qrImg" class="qrImg" src="./assets/QR.png" alt="QR code" onerror="this.style.opacity='0';">
    <div class="qrText">
      <div class="qrMain">Les mer - Kjøp billett</div>
      <div class="qrSub">www.amotkulturhus.no</div>
    </div>
  </div>

  <div id="dateA" class="dateLayer"></div>
  <div id="dateB" class="dateLayer"></div>

<script>
(async () => {
  const CONFIG_SERVICE_URL = "https://script.google.com/macros/s/AKfycbzE-Tg7R9VX8i8jsbRd-Tg97_hFt6pbUel5lfz3_2Gs5HkrpCylxXIrdWYpWFc7-2qllw/exec";
  const FILMS_URL = "./assets/films.json";
  const ARR_URL   = "./assets/arrangements.json";
  const FIELD = "poster";

  const CONFIG_TIMEOUT_MS = 7000;
  const CONFIG_CACHE_KEY = "infoskjermenSharedConfigFromService";

  let posterSeconds = 12;
  let fadeMs = 900;
  let refreshSeconds = 300;

  let refreshTimer = null;

  let items = []; // { url, v, date }
  let idx = 0;
  let frontIsA = true;
  let qrShownOnce = false;

  const emptyEl = document.getElementById("empty");
  const A = document.getElementById("a");
  const B = document.getElementById("b");
  const dateA = document.getElementById("dateA");
  const dateB = document.getElementById("dateB");
  const qrWrap = document.getElementById("qrWrap");

  function readNumericParam(name) {
    const v = new URLSearchParams(location.search).get(name);
    if (v === null || v === "") return null;
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
  }

  function positiveParam(name, fallback) {
    const n = readNumericParam(name);
    return n !== null && n > 0 ? n : fallback;
  }

  function pickNumber(...values) {
    for (const value of values) {
      if (value === "" || value == null) continue;
      const n = Number(value);
      if (Number.isFinite(n)) return n;
    }
    return null;
  }

  function readCachedConfig() {
    try {
      return JSON.parse(localStorage.getItem(CONFIG_CACHE_KEY) || "{}");
    } catch {
      return {};
    }
  }

  function writeCachedConfig(cfg) {
    try {
      localStorage.setItem(CONFIG_CACHE_KEY, JSON.stringify(cfg || {}));
    } catch {}
  }

  function normalizeConfig(raw) {
    if (!raw) return {};
    if (typeof raw === "string") {
      try { return JSON.parse(raw); } catch { return {}; }
    }
    if (raw.data && typeof raw.data === "object") return raw.data;
    if (raw.config && typeof raw.config === "object") return raw.config;
    if (typeof raw === "object") return raw;
    return {};
  }

  function isMeaningfulCfg(raw) {
    const cfg = normalizeConfig(raw);
    const refresh = cfg.manifestRefreshSeconds ?? cfg.refreshSeconds;
    return (
      pickNumber(cfg.posterSeconds) !== null ||
      pickNumber(cfg.fadeMs) !== null ||
      pickNumber(refresh) !== null
    );
  }

  function parseDateParts(value) {
    if (!value) return null;

    const m = String(value).match(
      /^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})(?::(\d{2}))?$/
    );
    if (!m) return null;

    return {
      year: Number(m[1]),
      month: Number(m[2]),
      day: Number(m[3]),
      hour: Number(m[4]),
      minute: Number(m[5]),
      second: Number(m[6] || 0)
    };
  }

  function formatDateTimeRange(begin, end) {
    const b = parseDateParts(begin);
    if (!b) return begin || "";

    const beginDate = new Date(b.year, b.month - 1, b.day, b.hour, b.minute, b.second);
    if (Number.isNaN(beginDate.getTime())) return begin || "";

    const dateText = new Intl.DateTimeFormat("nb-NO", {
      day: "numeric",
      month: "long",
      year: "numeric"
    }).format(beginDate);

    const beginTime = new Intl.DateTimeFormat("nb-NO", {
      hour: "2-digit",
      minute: "2-digit"
    }).format(beginDate);

    const e = parseDateParts(end);
    if (!e) return `${dateText} kl. ${beginTime}`;

    const endDate = new Date(e.year, e.month - 1, e.day, e.hour, e.minute, e.second);
    if (Number.isNaN(endDate.getTime())) return `${dateText} kl. ${beginTime}`;

    const endTime = new Intl.DateTimeFormat("nb-NO", {
      hour: "2-digit",
      minute: "2-digit"
    }).format(endDate);

    return `${dateText} kl. ${beginTime} - ${endTime}`;
  }

  async function fetchJson(url, timeoutMs = 12000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);

    try {
      const r = await fetch(url, { cache: "no-store", signal: controller.signal });
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      return await r.json();
    } finally {
      clearTimeout(timer);
    }
  }

  function loadConfigJSONP(timeoutMs = CONFIG_TIMEOUT_MS) {
    return new Promise((resolve) => {
      const cbName = "__cfgcb_" + Math.random().toString(16).slice(2);
      let finished = false;
      let called = false;

      window[cbName] = (cfg) => {
        called = true;
        finish(cfg || {});
      };

      const s = document.createElement("script");
      s.src = CONFIG_SERVICE_URL + "?callback=" + cbName + "&_=" + Date.now();
      s.onerror = () => finish({});
      s.onload = () => {
        setTimeout(() => {
          if (!finished && !called) finish({});
        }, 250);
      };
      document.head.appendChild(s);

      const t = setTimeout(() => {
        if (!finished) finish({});
      }, timeoutMs);

      function cleanup() {
        clearTimeout(t);
        try { delete window[cbName]; } catch {}
        s.remove();
      }

      function finish(val) {
        if (finished) return;
        finished = true;
        cleanup();
        resolve(val);
      }
    });
  }

  async function loadConfigFromService(timeoutMs = CONFIG_TIMEOUT_MS) {
    try {
      const raw = await loadConfigJSONP(timeoutMs);
      const cfg = normalizeConfig(raw);

      if (isMeaningfulCfg(cfg)) {
        writeCachedConfig(cfg);
        return cfg;
      }
    } catch (err) {
      console.error("Config service read failed:", err);
    }

    return normalizeConfig(readCachedConfig());
  }

  function applyConfigToUi() {
    const dur = fadeMs + "ms";
    A.style.transitionDuration = dur;
    B.style.transitionDuration = dur;
    dateA.style.transitionDuration = dur;
    dateB.style.transitionDuration = dur;
    if (qrWrap) qrWrap.style.transitionDuration = dur;
  }

  async function load() {
    const cachedCfg = readCachedConfig();

    const [cfg, filmsData, arrData] = await Promise.all([
      loadConfigFromService(CONFIG_TIMEOUT_MS),
      fetchJson(FILMS_URL),
      fetchJson(ARR_URL)
    ]);

    posterSeconds = positiveParam(
      "p",
      pickNumber(cfg.posterSeconds, cachedCfg.posterSeconds, 12)
    );

    fadeMs = positiveParam(
      "fade",
      pickNumber(cfg.fadeMs, cachedCfg.fadeMs, 900)
    );

    refreshSeconds = positiveParam(
      "r",
      pickNumber(
        cfg.manifestRefreshSeconds,
        cfg.refreshSeconds,
        cachedCfg.manifestRefreshSeconds,
        cachedCfg.refreshSeconds,
        300
      )
    );

    applyConfigToUi();

    const v1 = filmsData.updated ? ("?v=" + encodeURIComponent(filmsData.updated)) : "";
    const v2 = arrData.updated ? ("?v=" + encodeURIComponent(arrData.updated)) : "";

    const films = (filmsData.films || [])
      .filter(x => x?.[FIELD])
      .map(x => ({
        url: x[FIELD],
        v: v1,
        date: formatDateTimeRange(x.begin, x.end)
      }));

    const arrs = (arrData.arrangements || [])
      .filter(x => x?.[FIELD])
      .map(x => ({
        url: x[FIELD],
        v: v2,
        date: formatDateTimeRange(x.begin, x.end)
      }));

    const nextItems = films.concat(arrs);

    const changed =
      nextItems.length !== items.length ||
      nextItems.some((it, i) =>
        it.url !== items[i]?.url ||
        it.v !== items[i]?.v ||
        it.date !== items[i]?.date
      );

    items = nextItems;
    if (changed) idx = 0;

    emptyEl.style.display = items.length ? "none" : "flex";
  }

  async function preload(item) {
    await new Promise(resolve => {
      const img = new Image();
      img.onload = resolve;
      img.onerror = resolve;
      img.src = item.url + item.v;
    });
  }

  function swapTo(item) {
    const frontImg  = frontIsA ? A : B;
    const backImg   = frontIsA ? B : A;
    const frontDate = frontIsA ? dateA : dateB;
    const backDate  = frontIsA ? dateB : dateA;

    backImg.src = item.url + item.v;

    const text = (item.date || "").trim();

    backDate.textContent = text;
    if (text) {
      backDate.classList.add("show");
    } else {
      backDate.classList.remove("show");
    }

    backImg.classList.add("show");
    frontImg.classList.remove("show");
    frontDate.classList.remove("show");

    if (!qrShownOnce && qrWrap) {
      qrWrap.classList.add("show");
      qrShownOnce = true;
    }

    frontIsA = !frontIsA;
  }

  async function tick() {
    if (!items.length) {
      setTimeout(tick, 2000);
      return;
    }

    const item = items[idx % items.length];
    idx += 1;

    await preload(item);
    swapTo(item);

    setTimeout(tick, posterSeconds * 1000);
  }

  function scheduleReload() {
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(async () => {
      try {
        await load();
      } catch (err) {
        console.error("Portrait manifest/config reload failed:", err);
      }
      scheduleReload();
    }, refreshSeconds * 1000);
  }

  await load();
  tick();
  scheduleReload();
})();
</script>
</body>
</html>
