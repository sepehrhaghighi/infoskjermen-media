<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mangler landscape – filmer</title>
  <style>
    :root { color-scheme: dark; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #0b0b0b;
      color: #f2f2f2;
      font: 15px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      line-height: 1.15;
    }

    .meta {
      color: #bdbdbd;
      margin-bottom: 18px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
    }

    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #2b2b2b;
      background: #161616;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #1d1d1d;
    }

    .card {
      background: rgba(21,21,21,0.92);
      border: 1px solid rgba(36,36,36,0.95);
      border-radius: 14px;
      padding: 14px;
      margin: 12px 0;
      box-shadow: 0 6px 24px rgba(0,0,0,0.28);
    }

    .ok {
      color: #bfffd0;
    }

    .warn {
      color: #ffd59b;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      word-break: break-all;
    }

    .row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px 12px;
      margin-top: 8px;
    }

    .label {
      color: #bdbdbd;
    }

    .small {
      font-size: 13px;
      color: #bdbdbd;
    }

    .empty {
      padding: 18px;
      border-radius: 14px;
      background: #121212;
      border: 1px solid #242424;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Filmer som mangler landscape</h1>
    <div class="meta" id="meta">Laster…</div>

    <div class="toolbar">
      <button id="reloadBtn" type="button">Oppdater nå</button>
      <div class="small">Siden oppdaterer automatisk hvert 30. minutt.</div>
    </div>

    <div id="list"></div>
  </div>

  <script>
    (() => {
      const FILMS_URL = "./assets/films.json";
      const REFRESH_MS = 30 * 60 * 1000;

      const metaEl = document.getElementById("meta");
      const listEl = document.getElementById("list");
      const reloadBtn = document.getElementById("reloadBtn");

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function guessTitle(item, index) {
        return (
          item.title ||
          item.name ||
          item.film ||
          item.movie ||
          item.programTitle ||
          item.originalTitle ||
          `Film ${index + 1}`
        );
      }

      async function fetchJson(url) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        return await response.json();
      }

      function renderMissing(data) {
        const films = Array.isArray(data?.films) ? data.films : [];

        const missing = films
          .map((item, index) => ({ item, index }))
          .filter(({ item }) => item?.poster && !item?.landscape)
          .map(({ item, index }) => ({
            index,
            title: guessTitle(item, index),
            poster: item.poster || "",
            landscape: item.landscape || "",
            raw: item
          }));

        const updatedText = data?.updated
          ? `films.json oppdatert: ${data.updated}`
          : "films.json har ingen 'updated'-verdi";

        metaEl.innerHTML = `
          <span class="${missing.length ? "warn" : "ok"}">
            ${missing.length
              ? `${missing.length} film(er) mangler landscape`
              : `Ingen filmer mangler landscape`}
          </span>
          · ${escapeHtml(updatedText)}
          · Sist sjekket: ${escapeHtml(new Date().toLocaleString("nb-NO"))}
        `;

        if (!missing.length) {
          listEl.innerHTML = `
            <div class="empty ok">
              Alt ser bra ut. Ingen filmer med poster mangler landscape akkurat nå.
            </div>
          `;
          return;
        }

        listEl.innerHTML = missing.map(entry => `
          <div class="card">
            <div><strong>${escapeHtml(entry.title)}</strong></div>
            <div class="row">
              <div class="label">Index</div>
              <div>${entry.index}</div>

              <div class="label">Poster</div>
              <div class="mono">${escapeHtml(entry.poster)}</div>

              <div class="label">Landscape</div>
              <div class="mono">${entry.landscape ? escapeHtml(entry.landscape) : "<span class='warn'>Mangler</span>"}</div>
            </div>
          </div>
        `).join("");
      }

      async function load() {
        metaEl.textContent = "Laster…";
        try {
          const data = await fetchJson(FILMS_URL);
          renderMissing(data);
        } catch (err) {
          metaEl.innerHTML = `<span class="warn">Kunne ikke laste films.json</span>`;
          listEl.innerHTML = `
            <div class="empty">
              <div><strong>Feil ved lasting</strong></div>
              <div class="small mono">${escapeHtml(err?.message || err)}</div>
            </div>
          `;
        }
      }

      reloadBtn.addEventListener("click", load);

      load();
      setInterval(load, REFRESH_MS);
    })();
  </script>
</body>
</html>
