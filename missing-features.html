<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Missing Features</title>
  <style>
    :root { color-scheme: dark; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #0b0b0b;
      color: #f2f2f2;
      font: 16px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .wrap {
      max-width: 900px;
      margin: 28px auto;
      padding: 0 18px 40px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.15;
    }

    .meta {
      color: #bdbdbd;
      margin-bottom: 18px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #2b2b2b;
      background: #161616;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #1d1d1d;
    }

    .card {
      background: rgba(21,21,21,0.92);
      border: 1px solid rgba(36,36,36,0.95);
      border-radius: 14px;
      padding: 14px 16px;
      margin: 10px 0;
      box-shadow: 0 6px 24px rgba(0,0,0,0.28);
    }

    .empty {
      padding: 18px;
      border-radius: 14px;
      background: #121212;
      border: 1px solid #242424;
    }

    .ok { color: #bfffd0; }
    .warn { color: #ffd59b; }

    ol {
      margin: 0;
      padding-left: 24px;
    }

    li {
      margin: 10px 0;
    }

    .small {
      font-size: 13px;
      color: #bdbdbd;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Missing Features</h1>
    <div id="meta" class="meta">Laster…</div>

    <div class="toolbar">
      <button id="reloadBtn" type="button">Oppdater nå</button>
      <div class="small">Siden oppdaterer automatisk hvert 30. minutt.</div>
    </div>

    <div id="list"></div>
  </div>

  <script>
    (() => {
      const FILMS_URL = "./assets/films.json";
      const REFRESH_MS = 30 * 60 * 1000;

      const metaEl = document.getElementById("meta");
      const listEl = document.getElementById("list");
      const reloadBtn = document.getElementById("reloadBtn");

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function guessTitle(item, index) {
        return (
          item.title ||
          item.name ||
          item.film ||
          item.movie ||
          item.programTitle ||
          item.originalTitle ||
          `Film ${index + 1}`
        );
      }

      function normalizeTitle(title) {
        return String(title || "")
          .toLowerCase()
          .trim()
          .replace(/\s+/g, " ");
      }

      async function fetchJson(url) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        return await response.json();
      }

      function renderMissing(data) {
        const films = Array.isArray(data?.films) ? data.films : [];

        const rawMissing = films
          .map((item, index) => ({ item, index }))
          .filter(({ item }) => item?.poster && !item?.landscape)
          .map(({ item, index }) => ({
            title: guessTitle(item, index)
          }));

        const seen = new Set();
        const missing = [];

        for (const entry of rawMissing) {
          const key = normalizeTitle(entry.title);
          if (!key || seen.has(key)) continue;
          seen.add(key);
          missing.push(entry);
        }

        const updatedText = data?.updated
          ? `films.json oppdatert: ${data.updated}`
          : "films.json har ingen updated-verdi";

        metaEl.innerHTML = `
          <span class="${missing.length ? "warn" : "ok"}">
            ${missing.length
              ? `${missing.length} film(er) mangler landscape`
              : "Ingen filmer mangler landscape"}
          </span>
          · ${escapeHtml(updatedText)}
          · Sist sjekket: ${escapeHtml(new Date().toLocaleString("nb-NO"))}
        `;

        if (!missing.length) {
          listEl.innerHTML = `
            <div class="empty ok">
              Ingen filmer mangler landscape akkurat nå.
            </div>
          `;
          return;
        }

        listEl.innerHTML = `
          <div class="card">
            <ol>
              ${missing.map((entry, i) => `
                <li><strong>Film ${i + 1}</strong> — ${escapeHtml(entry.title)}</li>
              `).join("")}
            </ol>
          </div>
        `;
      }

      async function load() {
        metaEl.textContent = "Laster…";
        try {
          const data = await fetchJson(FILMS_URL);
          renderMissing(data);
        } catch (err) {
          metaEl.innerHTML = `<span class="warn">Kunne ikke laste films.json</span>`;
          listEl.innerHTML = `
            <div class="empty">
              Feil ved lasting: ${escapeHtml(err?.message || err)}
            </div>
          `;
        }
      }

      reloadBtn.addEventListener("click", load);

      load();
      setInterval(load, REFRESH_MS);
    })();
  </script>
</body>
</html>
