<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Films – Landscape</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #posterScene {
      position: absolute;
      inset: 0;
      display: block;
      z-index: 1;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 900ms ease-in-out;
      will-change: opacity;
    }

    .layer.show {
      opacity: 1;
    }

    #empty {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: #000;
      text-align: center;
      padding: 40px;
      font: 26px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      z-index: 100;
    }

    #calendarScene {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 2;
      background: #000;
    }

    #calendarFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    #calendarLoading {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #eaf4ff;
      text-align: center;
      padding: 40px;
      font: 32px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(
        90deg,
        #4ed347 0%,
        #37b352 12%,
        #2f9b61 26%,
        #2c7d78 40%,
        #2a668e 56%,
        #284ea7 72%,
        #2c37c2 86%,
        #3124dd 100%
      );
    }
  </style>
</head>
<body>
  <div id="empty">No film landscape posters available.</div>

  <div id="posterScene">
    <div class="stage">
      <img id="a" class="layer show" alt="">
      <img id="b" class="layer" alt="">
    </div>
  </div>

  <div id="calendarScene">
    <iframe
      id="calendarFrame"
      title="Kalenderslide"
      loading="eager"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
    <div id="calendarLoading">Laster kalenderdata…</div>
  </div>

<script>
(async () => {
  const CONFIG_SERVICE_URL = "https://script.google.com/macros/s/AKfycbyeAHLzvmNUTGn_FWr8fTr1GDHVocivJG7M6Fpe6Lfcm0MjIQ-KjLZIhmkiNc7q00HLHA/exec";
  const CALENDAR_FRAME_URL = "https://sepehrhaghighi.github.io/infoskjermen-media/calendar-slide.html";
  const MANIFEST_URL = "./assets/films.json";
  const EXTRA_MANIFEST_URL = "./assets/landscape_extra/manifest.json";
  const FIELD = "landscape";

  const CONFIG_TIMEOUT_MS = 7000;
  const CALENDAR_FRAME_TIMEOUT_MS = 12000;
  const CONFIG_CACHE_KEY = "infoskjermenSharedConfigFromService";

  let posterSeconds = 12;
  let calendarSlideSeconds = 0;
  let fadeMs = 900;
  let refreshSeconds = 300;

  let items = [];
  let idx = 0;
  let frontIsA = true;
  let refreshTimer = null;
  let calendarFrameLoadId = 0;

  const emptyEl = document.getElementById("empty");
  const A = document.getElementById("a");
  const B = document.getElementById("b");

  const posterScene = document.getElementById("posterScene");
  const calendarScene = document.getElementById("calendarScene");
  const calendarFrame = document.getElementById("calendarFrame");
  const calendarLoading = document.getElementById("calendarLoading");

  function positiveParam(name, fallback) {
    const v = new URLSearchParams(location.search).get(name);
    const n = Number(v);
    return Number.isFinite(n) && n > 0 ? n : fallback;
  }

  function nonNegativeParam(name, fallback) {
    const v = new URLSearchParams(location.search).get(name);
    const n = Number(v);
    return Number.isFinite(n) && n >= 0 ? n : fallback;
  }

  function readCachedConfig() {
    try {
      return JSON.parse(localStorage.getItem(CONFIG_CACHE_KEY) || "{}");
    } catch {
      return {};
    }
  }

  function writeCachedConfig(cfg) {
    try {
      localStorage.setItem(CONFIG_CACHE_KEY, JSON.stringify(cfg || {}));
    } catch {}
  }

  function normalizeConfig(raw) {
    if (!raw) return {};
    if (typeof raw === "string") {
      try { return JSON.parse(raw); } catch { return {}; }
    }
    if (raw.data && typeof raw.data === "object") return raw.data;
    if (raw.config && typeof raw.config === "object") return raw.config;
    if (typeof raw === "object") return raw;
    return {};
  }

  function isMeaningfulCfg(raw) {
    const cfg = normalizeConfig(raw);
    const refresh = cfg.manifestRefreshSeconds ?? cfg.refreshSeconds;
    return (
      cfg.posterSeconds != null ||
      cfg.calendarSlideSeconds != null ||
      cfg.fadeMs != null ||
      refresh != null
    );
  }

  async function fetchJson(url, timeoutMs = 12000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);

    try {
      const r = await fetch(url, {
        cache: "no-store",
        signal: controller.signal
      });
      if (!r.ok) throw new Error(r.status + " " + r.statusText);
      return await r.json();
    } finally {
      clearTimeout(timer);
    }
  }

  function loadConfigJSONP(extraParams = {}, timeoutMs = CONFIG_TIMEOUT_MS) {
    return new Promise((resolve) => {
      const cbName = "__cfgcb_" + Math.random().toString(16).slice(2);
      let finished = false;
      let called = false;

      window[cbName] = (cfg) => {
        called = true;
        finish(cfg || {});
      };

      const params = new URLSearchParams({
        callback: cbName,
        _: String(Date.now()),
        ...Object.fromEntries(
          Object.entries(extraParams).filter(([, v]) => v != null && String(v).length > 0)
        )
      });

      const s = document.createElement("script");
      s.src = CONFIG_SERVICE_URL + "?" + params.toString();

      s.onerror = () => finish({});
      s.onload = () => {
        setTimeout(() => {
          if (!finished && !called) finish({});
        }, 250);
      };

      document.head.appendChild(s);

      const t = setTimeout(() => {
        if (!finished) finish({});
      }, timeoutMs);

      function cleanup() {
        clearTimeout(t);
        try { delete window[cbName]; } catch {}
        s.remove();
      }

      function finish(val) {
        if (finished) return;
        finished = true;
        cleanup();
        resolve(val);
      }
    });
  }

  async function loadConfigFromService(timeoutMs = CONFIG_TIMEOUT_MS) {
    try {
      const raw = await loadConfigJSONP({}, timeoutMs);
      const cfg = normalizeConfig(raw);

      if (isMeaningfulCfg(cfg)) {
        writeCachedConfig(cfg);
        return cfg;
      }
    } catch (err) {
      console.error("Config service read failed:", err);
    }

    return normalizeConfig(readCachedConfig());
  }

  function normalizeExtraUrl(url) {
    if (!url) return "";
    if (url.startsWith("/assets/")) return "." + url;
    return url;
  }

  async function loadManualExtras(manifestUrl, baseSeconds) {
    try {
      const m = await fetchJson(manifestUrl, 12000);
      const rawItems = Array.isArray(m.items) ? m.items : [];
      return rawItems
        .map((it) => ({
          kind: "poster",
          url: normalizeExtraUrl(it?.url || ""),
          v: it?.v ? ("?v=" + encodeURIComponent(it.v)) : "",
          seconds: baseSeconds
        }))
        .filter((it) => it.url);
    } catch {
      return [];
    }
  }

  function mergeUniqueItems(primary, extra) {
    const seen = new Set(primary.map((it) => it.url));
    const out = primary.slice();

    for (const it of extra) {
      if (it.url && !seen.has(it.url)) {
        seen.add(it.url);
        out.push(it);
      }
    }
    return out;
  }

  function itemsChanged(nextItems) {
    if (nextItems.length !== items.length) return true;

    for (let i = 0; i < nextItems.length; i += 1) {
      const a = nextItems[i];
      const b = items[i];
      if (!b) return true;
      if (a.kind !== b.kind) return true;
      if ((a.url || "") !== (b.url || "")) return true;
      if ((a.v || "") !== (b.v || "")) return true;
      if ((a.seconds || 0) !== (b.seconds || 0)) return true;
    }

    return false;
  }

  async function load() {
    const cachedCfg = readCachedConfig();

    const [cfg, data] = await Promise.all([
      loadConfigFromService(CONFIG_TIMEOUT_MS),
      fetchJson(MANIFEST_URL, 12000)
    ]);

    posterSeconds = positiveParam("p", cfg.posterSeconds ?? cachedCfg.posterSeconds ?? 12);
    calendarSlideSeconds = nonNegativeParam("cal", cfg.calendarSlideSeconds ?? cachedCfg.calendarSlideSeconds ?? 0);
    fadeMs = positiveParam("fade", cfg.fadeMs ?? cachedCfg.fadeMs ?? 900);
    refreshSeconds = positiveParam(
      "r",
      cfg.manifestRefreshSeconds ??
      cfg.refreshSeconds ??
      cachedCfg.manifestRefreshSeconds ??
      cachedCfg.refreshSeconds ??
      300
    );

    A.style.transitionDuration = fadeMs + "ms";
    B.style.transitionDuration = fadeMs + "ms";

    const baseVersion = data.updated ? ("?v=" + encodeURIComponent(data.updated)) : "";

    const posters = (data.films || [])
      .map((x) => x?.[FIELD])
      .filter(Boolean)
      .map((url) => ({
        kind: "poster",
        url,
        v: baseVersion,
        seconds: posterSeconds
      }));

    const extraItems = await loadManualExtras(EXTRA_MANIFEST_URL, posterSeconds);
    let nextItems = mergeUniqueItems(posters, extraItems);

    if (calendarSlideSeconds > 0) {
      nextItems.unshift({ kind: "calendar", seconds: calendarSlideSeconds });
    }

    const changed = itemsChanged(nextItems);
    items = nextItems;
    if (changed) idx = 0;

    emptyEl.style.display = items.length ? "none" : "flex";
  }

  async function preloadPoster(item) {
    await new Promise((resolve) => {
      const img = new Image();
      img.onload = resolve;
      img.onerror = resolve;
      img.src = item.url + (item.v || "");
    });
  }

  function showPosterScene() {
    calendarScene.style.display = "none";
    posterScene.style.display = "block";
  }

  function showCalendarScene() {
    posterScene.style.display = "none";
    calendarScene.style.display = "block";
  }

  function swapToPoster(item) {
    const front = frontIsA ? A : B;
    const back = frontIsA ? B : A;

    back.src = item.url + (item.v || "");
    back.classList.add("show");
    front.classList.remove("show");

    frontIsA = !frontIsA;
  }

  function loadCalendarFrame(forceReload = true) {
    const thisLoadId = ++calendarFrameLoadId;

    return new Promise((resolve) => {
      let settled = false;

      function done() {
        if (settled || thisLoadId !== calendarFrameLoadId) return;
        settled = true;
        calendarLoading.style.display = "none";
        resolve();
      }

      calendarLoading.style.display = "flex";

      const timer = setTimeout(() => {
        calendarFrame.removeEventListener("load", onLoad);
        done();
      }, CALENDAR_FRAME_TIMEOUT_MS);

      function onLoad() {
        clearTimeout(timer);
        calendarFrame.removeEventListener("load", onLoad);
        done();
      }

      calendarFrame.addEventListener("load", onLoad, { once: true });

      if (forceReload || !calendarFrame.src) {
        const sep = CALENDAR_FRAME_URL.includes("?") ? "&" : "?";
        calendarFrame.src = CALENDAR_FRAME_URL + sep + "_=" + Date.now();
      } else {
        clearTimeout(timer);
        calendarFrame.removeEventListener("load", onLoad);
        done();
      }
    });
  }

  async function tick() {
    if (!items.length) {
      setTimeout(tick, 2000);
      return;
    }

    const item = items[idx % items.length];
    idx += 1;

    if (item.kind === "calendar") {
      showCalendarScene();
      await loadCalendarFrame(true);

      setTimeout(() => {
        showPosterScene();
        tick();
      }, (item.seconds || 15) * 1000);

      return;
    }

    showPosterScene();
    await preloadPoster(item);
    swapToPoster(item);

    setTimeout(tick, (item.seconds || posterSeconds) * 1000);
  }

  function scheduleReload() {
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(async () => {
      try {
        await load();
      } catch (err) {
        console.error("Manifest/config reload failed:", err);
      }
      scheduleReload();
    }, refreshSeconds * 1000);
  }

  await load();

  if (calendarSlideSeconds > 0) {
    showCalendarScene();
    await loadCalendarFrame(true);

    idx = 1;

    setTimeout(() => {
      showPosterScene();
      tick();
    }, calendarSlideSeconds * 1000);
  } else {
    showPosterScene();
    tick();
  }

  scheduleReload();
})();
</script>
</body>
</html>
