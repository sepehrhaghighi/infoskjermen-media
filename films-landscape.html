<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Films – Landscape</title>
  <style>
    html, body {
      margin:0;
      height:100%;
      background:#000;
      overflow:hidden;
    }

    .stage {
      position:relative;
      width:100%;
      height:100%;
      background:#000;
    }

    .layer {
      position:absolute;
      inset:0;
      opacity:0;
      transition: opacity 900ms ease-in-out;
      will-change: opacity;
      background:#000;
    }

    .layer.show {
      opacity:1;
    }

    .mediaImg,
    .mediaFrame {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      border:0;
      background:#000;
    }

    .mediaImg {
      object-fit:contain;
    }

    .mediaFrame {
      border:0;
    }

    #empty {
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      color:#fff;
      background:#000;
      text-align:center;
      padding:40px;
      font:26px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      z-index:10;
    }
  </style>
</head>
<body>
  <div id="empty">No film landscape posters available.</div>

  <div class="stage">
    <div id="a" class="layer show"></div>
    <div id="b" class="layer"></div>
  </div>

<script>
(async () => {
  const CONFIG_SERVICE_URL = "https://script.google.com/macros/s/AKfycbyeAHLzvmNUTGn_FWr8fTr1GDHVocivJG7M6Fpe6Lfcm0MjIQ-KjLZIhmkiNc7q00HLHA/exec";
  const MANIFEST_URL = "./assets/films.json";
  const EXTRA_MANIFEST_URL = "./assets/landscape_extra/manifest.json";
  const CALENDAR_SLIDE_URL = "https://sepehrhaghighi.github.io/infoskjermen-media/calendar-slide.html";
  const FIELD = "landscape";

  let posterSeconds = 12;
  let calendarSlideSeconds = 0;
  let fadeMs = 900;
  let refreshSeconds = 300;

  let refreshTimer = null;
  let tickTimer = null;

  /*
    items:
    { kind: "image", url, v, seconds }
    { kind: "calendar", url, seconds }
  */
  let items = [];
  let idx = 0;
  let frontIsA = true;

  const emptyEl = document.getElementById("empty");
  const A = document.getElementById("a");
  const B = document.getElementById("b");

  function positiveParam(name, fallback) {
    const v = new URLSearchParams(location.search).get(name);
    const n = Number(v);
    return Number.isFinite(n) && n > 0 ? n : fallback;
  }

  function nonNegativeParam(name, fallback) {
    const v = new URLSearchParams(location.search).get(name);
    const n = Number(v);
    return Number.isFinite(n) && n >= 0 ? n : fallback;
  }

  async function fetchJson(url) {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return await r.json();
  }

  function normalizeExtraUrl(url) {
    if (!url) return "";
    if (url.startsWith("/assets/")) return "." + url;
    return url;
  }

  async function loadManualExtras(manifestUrl) {
    try {
      const m = await fetchJson(manifestUrl);
      const rawItems = Array.isArray(m.items) ? m.items : [];
      return rawItems
        .map(it => ({
          kind: "image",
          url: normalizeExtraUrl(it?.url || ""),
          v: it?.v ? ("?v=" + encodeURIComponent(it.v)) : "",
          seconds: posterSeconds
        }))
        .filter(it => it.url);
    } catch {
      return [];
    }
  }

  function mergeUniqueItems(primary, extra) {
    const seen = new Set(primary.map(it => it.url));
    const out = primary.slice();

    for (const it of extra) {
      if (it.url && !seen.has(it.url)) {
        seen.add(it.url);
        out.push(it);
      }
    }

    return out;
  }

  function loadConfigJSONP(timeoutMs = 4000) {
    return new Promise((resolve) => {
      const cbName = "__cfgcb_" + Math.random().toString(16).slice(2);
      let done = false;

      window[cbName] = (cfg) => {
        done = true;
        cleanup();
        resolve(cfg || {});
      };

      const s = document.createElement("script");
      s.src = CONFIG_SERVICE_URL + "?callback=" + cbName + "&_=" + Date.now();
      s.onerror = () => { cleanup(); resolve({}); };
      document.head.appendChild(s);

      const t = setTimeout(() => {
        if (!done) {
          cleanup();
          resolve({});
        }
      }, timeoutMs);

      function cleanup() {
        clearTimeout(t);
        try { delete window[cbName]; } catch {}
        s.remove();
      }
    });
  }

  function itemsChanged(nextItems) {
    if (nextItems.length !== items.length) return true;

    for (let i = 0; i < nextItems.length; i += 1) {
      const a = nextItems[i];
      const b = items[i];
      if (!b) return true;
      if (a.kind !== b.kind) return true;
      if (a.url !== b.url) return true;
      if ((a.v || "") !== (b.v || "")) return true;
      if ((a.seconds || 0) !== (b.seconds || 0)) return true;
    }

    return false;
  }

  async function load() {
    const [cfg, data] = await Promise.all([
      loadConfigJSONP(),
      fetchJson(MANIFEST_URL)
    ]);

    posterSeconds = positiveParam("p", cfg.posterSeconds ?? 12);
    calendarSlideSeconds = nonNegativeParam("cal", cfg.calendarSlideSeconds ?? 0);
    fadeMs = positiveParam("fade", cfg.fadeMs ?? 900);
    refreshSeconds = positiveParam("r", cfg.manifestRefreshSeconds ?? 300);

    A.style.transitionDuration = fadeMs + "ms";
    B.style.transitionDuration = fadeMs + "ms";

    const baseVersion = data.updated ? ("?v=" + encodeURIComponent(data.updated)) : "";

    const films = (data.films || [])
      .map(x => x?.[FIELD])
      .filter(Boolean)
      .map(url => ({
        kind: "image",
        url,
        v: baseVersion,
        seconds: posterSeconds
      }));

    const extraItems = await loadManualExtras(EXTRA_MANIFEST_URL);

    let nextItems = mergeUniqueItems(films, extraItems);

    if (calendarSlideSeconds > 0) {
      nextItems.push({
        kind: "calendar",
        url: CALENDAR_SLIDE_URL,
        seconds: calendarSlideSeconds
      });
    }

    const changed = itemsChanged(nextItems);
    items = nextItems;

    if (changed) idx = 0;

    emptyEl.style.display = items.length ? "none" : "flex";
  }

  async function preload(item) {
    if (!item) return;

    if (item.kind === "image") {
      await new Promise(resolve => {
        const img = new Image();
        img.onload = resolve;
        img.onerror = resolve;
        img.src = item.url + (item.v || "");
      });
    }
  }

  function clearLayer(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function setLayerContent(el, item) {
    clearLayer(el);

    if (item.kind === "calendar") {
      const frame = document.createElement("iframe");
      frame.className = "mediaFrame";
      frame.setAttribute("title", "Calendar slide");
      frame.setAttribute("loading", "eager");
      frame.setAttribute("referrerpolicy", "no-referrer");
      frame.src = item.url + (item.url.indexOf("?") === -1 ? "?_=" : "&_=") + Date.now();
      el.appendChild(frame);
      return;
    }

    const img = document.createElement("img");
    img.className = "mediaImg";
    img.alt = "";
    img.src = item.url + (item.v || "");
    el.appendChild(img);
  }

  function swapTo(item) {
    const front = frontIsA ? A : B;
    const back  = frontIsA ? B : A;

    setLayerContent(back, item);
    back.classList.add("show");
    front.classList.remove("show");

    frontIsA = !frontIsA;
  }

  async function tick() {
    if (!items.length) {
      tickTimer = setTimeout(tick, 2000);
      return;
    }

    const item = items[idx % items.length];
    idx += 1;

    await preload(item);
    swapTo(item);

    tickTimer = setTimeout(tick, (item.seconds || posterSeconds) * 1000);
  }

  function scheduleReload() {
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(async () => {
      try {
        await load();
      } catch {}
      scheduleReload();
    }, refreshSeconds * 1000);
  }

  await load();
  tick();
  scheduleReload();
})();
</script>
</body>
</html>
