<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arrangements – Landscape</title>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; }

    /* Poster scene */
    #posterScene { position:absolute; inset:0; }
    .stage{ position:relative; width:100%; height:100%; z-index:1; }
    .layer{
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:contain; opacity:0; transition: opacity 900ms ease-in-out; will-change: opacity;
    }
    .layer.show{ opacity:1; }

    #empty{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      color:#fff; background:#000; text-align:center; padding:40px;
      font:26px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      z-index:2000;
    }

    .qrWrap{
      position:fixed; right:20px; bottom:20px; z-index:1000;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      pointer-events:none;
      opacity:0; transition: opacity 900ms ease-in-out; will-change: opacity;
    }
    .qrWrap.show{ opacity:1; }
    .qrImg{
      width:146px; height:146px; object-fit:contain;
      background:rgba(255,255,255,0.97);
      padding:10px; border-radius:16px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.50), 0 3px 10px rgba(0,0,0,0.30);
    }
    .qrText{
      display:flex; flex-direction:column; align-items:center; gap:4px;
      color:#fff; background:rgba(0,0,0,0.74);
      padding:9px 14px; border-radius:14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.38), 0 2px 8px rgba(0,0,0,0.24);
      text-align:center; line-height:1.15; white-space:nowrap;
    }
    .qrMain{ font:16px/1.15 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .qrSub{ font:14px/1.15 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; opacity:0.95; }

    .dateLayer{
      position:fixed; left:22px; bottom:22px; z-index:900;
      opacity:0; transition: opacity 900ms ease-in-out; will-change: opacity;
      color:#fff; background:rgba(0,0,0,0.74);
      padding:10px 16px; border-radius:14px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.28);
      font:24px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      pointer-events:none; white-space:nowrap;
      max-width:calc(100vw - 260px); overflow:hidden; text-overflow:ellipsis;
    }
    .dateLayer.show{ opacity:1; }

    /* Calendar iframe scene */
    #calendarScene{
      position:absolute; inset:0;
      display:none;
      background:#000;
      z-index:5;
    }
    #calendarFrame{
      position:absolute; inset:0;
      width:100%; height:100%;
      border:0;
      background:#000;
    }
  </style>
</head>
<body>
  <div id="empty">No arrangement landscape posters available.</div>

  <!-- Poster scene -->
  <div id="posterScene">
    <div class="stage">
      <img id="a" class="layer show" alt="">
      <img id="b" class="layer" alt="">
    </div>

    <div id="qrWrap" class="qrWrap">
      <img id="qrImg" class="qrImg" src="./assets/QR.png" alt="QR code" onerror="this.style.opacity='0';">
      <div class="qrText">
        <div class="qrMain">Les mer - Kjøp billett</div>
        <div class="qrSub">www.amotkulturhus.no</div>
      </div>
    </div>

    <div id="dateA" class="dateLayer"></div>
    <div id="dateB" class="dateLayer"></div>
  </div>

  <!-- Calendar scene -->
  <div id="calendarScene">
    <iframe id="calendarFrame" title="Kalenderslide" referrerpolicy="no-referrer"></iframe>
  </div>

<script>
(async () => {
  const CONFIG_SERVICE_URL = "https://script.google.com/macros/s/AKfycbyeAHLzvmNUTGn_FWr8fTr1GDHVocivJG7M6Fpe6Lfcm0MjIQ-KjLZIhmkiNc7q00HLHA/exec";
  const MANIFEST_URL = "./assets/arrangements.json";
  const FIELD = "landscape";

  const CALENDAR_URL = "https://sepehrhaghighi.github.io/infoskjermen-media/calendar-slide.html";

  let posterSeconds = 7;
  let calendarSlideSeconds = 20;
  let fadeMs = 900;
  let refreshSeconds = 300;

  let items = []; // {kind:'calendar', seconds} or {kind:'poster', url, date, v, seconds}
  let idx = 0;
  let frontIsA = true;
  let version = "";
  let refreshTimer = null;
  let lastCalendarLoadMs = 0;

  const emptyEl = document.getElementById("empty");
  const A = document.getElementById("a");
  const B = document.getElementById("b");
  const dateA = document.getElementById("dateA");
  const dateB = document.getElementById("dateB");
  const qrWrap = document.getElementById("qrWrap");
  const posterScene = document.getElementById("posterScene");
  const calendarScene = document.getElementById("calendarScene");
  const calendarFrame = document.getElementById("calendarFrame");

  function positiveParam(name, fallback) {
    const v = new URLSearchParams(location.search).get(name);
    const n = Number(v);
    return Number.isFinite(n) && n > 0 ? n : fallback;
  }
  function nonNegativeParam(name, fallback) {
    const v = new URLSearchParams(location.search).get(name);
    const n = Number(v);
    return Number.isFinite(n) && n >= 0 ? n : fallback;
  }

  function normalizeCfg(raw) {
    if (!raw) return {};
    if (raw.config && typeof raw.config === "object") return raw.config;
    if (raw.data && typeof raw.data === "object") return raw.data;
    if (typeof raw === "string") { try { return JSON.parse(raw); } catch { return {}; } }
    return raw;
  }

  function loadConfigJSONP(timeoutMs = 5000) {
    return new Promise((resolve) => {
      const cbName = "__cfgcb_" + Math.random().toString(16).slice(2);
      let done = false;

      window[cbName] = (cfg) => {
        done = true;
        cleanup();
        resolve(cfg || {});
      };

      const s = document.createElement("script");
      s.src = CONFIG_SERVICE_URL + "?callback=" + cbName + "&_=" + Date.now();
      s.onerror = () => { cleanup(); resolve({}); };
      document.head.appendChild(s);

      const t = setTimeout(() => {
        if (!done) { cleanup(); resolve({}); }
      }, timeoutMs);

      function cleanup() {
        clearTimeout(t);
        try { delete window[cbName]; } catch {}
        s.remove();
      }
    });
  }

  async function fetchJson(url) {
    const r = await fetch(url, { cache:"no-store" });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return await r.json();
  }

  function parseDateParts(value) {
    if (!value) return null;
    const m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})(?::(\d{2}))?$/);
    if (!m) return null;
    return { year:+m[1], month:+m[2], day:+m[3], hour:+m[4], minute:+m[5], second:+(m[6]||0) };
  }

  function formatArrangementDateTimeRange(begin, end) {
    const b = parseDateParts(begin);
    if (!b) return begin || "";
    const bd = new Date(b.year, b.month-1, b.day, b.hour, b.minute, b.second);
    if (Number.isNaN(bd.getTime())) return begin || "";

    const dateText = new Intl.DateTimeFormat("nb-NO", { day:"numeric", month:"long", year:"numeric" }).format(bd);
    const beginTime = new Intl.DateTimeFormat("nb-NO", { hour:"2-digit", minute:"2-digit" }).format(bd);

    const e = parseDateParts(end);
    if (!e) return `${dateText} kl. ${beginTime}`;

    const ed = new Date(e.year, e.month-1, e.day, e.hour, e.minute, e.second);
    if (Number.isNaN(ed.getTime())) return `${dateText} kl. ${beginTime}`;

    const endTime = new Intl.DateTimeFormat("nb-NO", { hour:"2-digit", minute:"2-digit" }).format(ed);
    return `${dateText} kl. ${beginTime} - ${endTime}`;
  }

  function signatureFromPosters(posters) {
    return posters.map(p => (p.url + "::" + (p.date || ""))).join("|");
  }

  async function load() {
    const [rawCfg, data] = await Promise.all([
      loadConfigJSONP(),
      fetchJson(MANIFEST_URL)
    ]);

    const cfg = normalizeCfg(rawCfg);

    posterSeconds = positiveParam("p", cfg.posterSeconds ?? 7);
    calendarSlideSeconds = nonNegativeParam("cal", cfg.calendarSlideSeconds ?? 20);
    fadeMs = positiveParam("fade", cfg.fadeMs ?? 900);
    refreshSeconds = positiveParam("r", cfg.manifestRefreshSeconds ?? 300);

    A.style.transitionDuration = fadeMs + "ms";
    B.style.transitionDuration = fadeMs + "ms";
    dateA.style.transitionDuration = fadeMs + "ms";
    dateB.style.transitionDuration = fadeMs + "ms";
    if (qrWrap) qrWrap.style.transitionDuration = fadeMs + "ms";

    version = data.updated ? ("?v=" + encodeURIComponent(data.updated)) : "";

    const posters = (data.arrangements || [])
      .filter(x => x?.[FIELD])
      .map(x => ({
        kind:"poster",
        url: x[FIELD],
        date: formatArrangementDateTimeRange(x.begin, x.end),
        v: version,
        seconds: posterSeconds
      }));

    const nextItems = [];
    if (calendarSlideSeconds > 0) nextItems.push({ kind:"calendar", seconds: calendarSlideSeconds });
    nextItems.push(...posters);

    const prevSig = signatureFromPosters(items.filter(x => x.kind === "poster"));
    const nextSig = signatureFromPosters(posters);
    const postersChanged = prevSig !== nextSig;

    items = nextItems;
    if (postersChanged) idx = 0;

    emptyEl.style.display = posters.length ? "none" : "flex";
  }

  async function preloadPoster(item) {
    await new Promise(resolve => {
      const img = new Image();
      img.onload = resolve;
      img.onerror = resolve;
      img.src = item.url + (item.v || "");
    });
  }

  function showPosterScene() {
    calendarScene.style.display = "none";
    posterScene.style.display = "block";
  }

  function ensureCalendarLoaded() {
    const now = Date.now();
    if (!calendarFrame.src || (now - lastCalendarLoadMs) > 2 * 60 * 1000) {
      calendarFrame.src = CALENDAR_URL + "?v=" + now;
      lastCalendarLoadMs = now;
    }
  }

  function showCalendarScene() {
    posterScene.style.display = "none";
    calendarScene.style.display = "block";
    ensureCalendarLoaded();
  }

  function swapToPoster(item) {
    const frontImg  = frontIsA ? A : B;
    const backImg   = frontIsA ? B : A;
    const frontDate = frontIsA ? dateA : dateB;
    const backDate  = frontIsA ? dateB : dateA;

    backImg.src = item.url + (item.v || "");

    const text = (item.date || "").trim();
    backDate.textContent = text;
    if (text) backDate.classList.add("show"); else backDate.classList.remove("show");

    backImg.classList.add("show");
    frontImg.classList.remove("show");
    frontDate.classList.remove("show");

    if (qrWrap) qrWrap.classList.add("show");
    frontIsA = !frontIsA;
  }

  async function tick() {
    if (!items.length) { setTimeout(tick, 2000); return; }

    const item = items[idx % items.length];
    idx += 1;

    if (item.kind === "calendar") {
      showCalendarScene();
      setTimeout(() => { showPosterScene(); tick(); }, (item.seconds || 15) * 1000);
      return;
    }

    showPosterScene();
    await preloadPoster(item);
    swapToPoster(item);
    setTimeout(tick, (item.seconds || posterSeconds) * 1000);
  }

  function scheduleReload() {
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(async () => {
      try { await load(); } catch {}
      scheduleReload();
    }, refreshSeconds * 1000);
  }

  await load();
  showPosterScene();
  tick();
  scheduleReload();
})();
</script>
</body>
</html>
